<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku AI Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=7">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen antialiased">
    <div id="app-loader" class="app-loader" aria-live="polite" aria-label="Loading application">
        <div class="loader-ring"></div>
        <p>Preparing AI Sudoku workspace...</p>
    </div>

    <!-- Animated Special Background -->
    <div class="bg-effects">
        <div class="mesh-overlay"></div>
        <div class="particle-dots"></div>

        <div class="circuit circuit-left" aria-hidden="true">
            <span class="trace t1"></span>
            <span class="trace t2"></span>
            <span class="trace t3"></span>
            <span class="node n1"></span>
            <span class="node n2"></span>
            <span class="node n3"></span>
            <span class="shape ring"></span>
            <span class="shape hex"></span>
        </div>

        <div class="circuit circuit-right" aria-hidden="true">
            <span class="trace t1"></span>
            <span class="trace t2"></span>
            <span class="trace t3"></span>
            <span class="node n1"></span>
            <span class="node n2"></span>
            <span class="node n3"></span>
            <span class="shape cube"></span>
            <span class="shape ring"></span>
        </div>
    </div>

    <div class="app-container">
        <div class="top-badge">AI Powered Sudoku Solver</div>

        <header>
            <h1>Sudoku <span class="accent">AI</span> Master</h1>
            <p>Challenge yourself or watch the AI solve it step-by-step with visual intelligence.</p>
        </header>

        <main>
            <div class="game-board">
                <div id="sudoku-grid" class="sudoku-grid">
                    <!-- Grid cells will be generated by JS -->
                </div>
            </div>

            <aside class="controls-panel">
                <div class="difficulty-selector">
                    <h3>Difficulty</h3>
                    <div class="button-group">
                        <div class="pill-slider" aria-hidden="true"></div>
                        <button class="diff-btn active" data-diff="easy">Easy</button>
                        <button class="diff-btn" data-diff="medium">Medium</button>
                        <button class="diff-btn" data-diff="hard">Hard</button>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="new-game-btn" class="primary-btn"><span class="icon">🔄</span> New Game</button>
                    <button id="solve-btn" class="ai-btn">
                        <span class="icon">✨</span> Solve with AI
                    </button>
                    <button id="clear-btn" class="secondary-btn">Clear Board</button>
                </div>

                <!-- Number Pad for mobile/easy input -->
                <div class="number-pad">
                    <button class="num-btn" data-val="1">1</button>
                    <button class="num-btn" data-val="2">2</button>
                    <button class="num-btn" data-val="3">3</button>
                    <button class="num-btn" data-val="4">4</button>
                    <button class="num-btn" data-val="5">5</button>
                    <button class="num-btn" data-val="6">6</button>
                    <button class="num-btn" data-val="7">7</button>
                    <button class="num-btn" data-val="8">8</button>
                    <button class="num-btn" data-val="9">9</button>
                    <button class="num-btn clear-cell-btn" data-val="0">⌫</button>
                </div>
            </aside>
        </main>

        <footer class="app-footer">
            <p>Built with HTML, CSS, JavaScript</p>
            <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="Open GitHub profile">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                    <path d="M12 0C5.37 0 0 5.49 0 12.26c0 5.42 3.44 10.01 8.2 11.63.6.12.82-.27.82-.6 0-.3-.01-1.29-.02-2.34-3.34.74-4.04-1.46-4.04-1.46-.55-1.42-1.33-1.8-1.33-1.8-1.09-.76.08-.75.08-.75 1.2.09 1.84 1.26 1.84 1.26 1.07 1.88 2.8 1.34 3.49 1.02.11-.79.42-1.34.76-1.65-2.66-.31-5.47-1.37-5.47-6.08 0-1.34.46-2.44 1.22-3.3-.12-.31-.53-1.57.12-3.26 0 0 1-.33 3.3 1.26A11.2 11.2 0 0 1 12 5.86c1.02.01 2.04.14 3 .41 2.3-1.59 3.29-1.26 3.29-1.26.66 1.69.25 2.95.13 3.26.76.86 1.22 1.96 1.22 3.3 0 4.72-2.81 5.77-5.49 6.07.43.39.82 1.16.82 2.34 0 1.69-.01 3.05-.01 3.46 0 .33.21.73.83.6A12.3 12.3 0 0 0 24 12.26C24 5.49 18.63 0 12 0z" />
                </svg>
                GitHub
            </a>
        </footer>
    </div>
    <script type="module" src="main.js?v=2"></script>
</body>
</html>
